name: Contract Schema Tests

# B3+B4: enforce the CB↔Swarm and Swarm→Sentinel schemas on every PR.
# Fails fast if:
#   - CB search result parsing breaks (test_cb_schema.py)
#   - Event schema validation breaks (test_events_schema.py)
#   - Schema versions are modified without an explicit commit-tag.
# Plan: <hydra-project-path>/plans/claude-swarm-peripherals-dod-2026-04-18.md §Phase B3+B4

on:
  push:
    branches: [main]
    paths:
      - 'src/cb_schema.py'
      - 'src/events_schema.py'
      - 'src/events.py'
      - 'src/context_assembly.py'
      - 'src/worker_context_assembly.py'
      - 'tests/test_cb_schema.py'
      - 'tests/test_events_schema.py'
      - '.github/workflows/contract.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/cb_schema.py'
      - 'src/events_schema.py'
      - 'src/events.py'
      - 'src/context_assembly.py'
      - 'src/worker_context_assembly.py'
      - 'tests/test_cb_schema.py'
      - 'tests/test_events_schema.py'
      - '.github/workflows/contract.yml'

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for schema-version-bump check

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run CB contract tests
        run: pytest tests/test_cb_schema.py -v --tb=short --color=yes

      - name: Run event schema tests
        run: pytest tests/test_events_schema.py -v --tb=short --color=yes

      - name: Strict-mode smoke test (catch silent drift)
        env:
          SWARM_EVENT_SCHEMA_STRICT: "1"
        run: |
          python -c "
          from src.events_schema import validate
          # Verify strict mode rejects unknown event_type
          try:
              validate('definitely_fake', {}, strict=True)
              print('FAIL: strict mode did not reject unknown event_type')
              exit(1)
          except ValueError:
              pass
          # Verify all known types validate cleanly with canonical bodies
          from src.events_schema import registered_event_types
          print('Registered event types:', registered_event_types())
          print('Strict-mode contract test: PASS')
          "

      - name: Schema-version bump guard
        # If CB_SEARCH_SCHEMA_VERSION or EVENT_SCHEMA_VERSION changes on this
        # PR, require the commit body to include 'schema-version-bump' tag
        # so the bump is deliberate (not an accidental drift).
        if: github.event_name == 'pull_request'
        run: |
          set -e
          CB_DIFF=$(git diff origin/main..HEAD -- src/cb_schema.py | grep -E '^[-+]CB_SEARCH_SCHEMA_VERSION' || true)
          EVT_DIFF=$(git diff origin/main..HEAD -- src/events_schema.py | grep -E '^[-+]EVENT_SCHEMA_VERSION' || true)
          if [ -n "$CB_DIFF" ] || [ -n "$EVT_DIFF" ]; then
            echo "::warning::Schema version bump detected"
            echo "CB diff: $CB_DIFF"
            echo "Event diff: $EVT_DIFF"
            # Require commit message tag
            if ! git log origin/main..HEAD --format=%B | grep -qE '(schema-version-bump|contract-bump|SEMVER-BUMP)'; then
              echo "::error::Schema version changed but no 'schema-version-bump' tag in commit message. Add it to confirm intentional."
              exit 1
            fi
            echo "::notice::Schema-version-bump tag found in commit — approved."
          else
            echo "No schema-version changes detected."
          fi

      - name: Comment PR with result
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Contract Schema Tests\n\n✅ CB + Event schemas green. Silent-drift regression guard active.'
            });
