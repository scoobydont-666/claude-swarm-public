# plan-approved: github-workflow-edit
name: README Staleness Check

# Flags PRs that touch source code without updating README.md.
# Apply the "skip-readme-check" label to bypass with a warning comment.
#
# MANUAL TEST: Open a PR that adds/modifies any file under src/, scripts/,
# libs/, *.py, *.ts, *.sh, etc. without touching README.md.  The job will
# fail with a clear explanation.  Add label "skip-readme-check" to bypass.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  readme-staleness:
    name: README staleness check
    runs-on: ubuntu-latest

    steps:
      - name: Get changed files
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the full file list for this PR via GitHub API
          FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[].filename')

          echo "All changed files:"
          echo "$FILES"
          echo ""

          # ---- path-ignore patterns (trivial changes) ----------------------
          # Strip files that are docs/meta-only changes so a pure-docs PR
          # never triggers the check.
          CODE_FILES=$(echo "$FILES" | grep -Ev \
            '^(\.github/|tests?/|__tests__/|.*\.md$|.*\.txt$|LICENSE.*|\.gitignore$)' \
            || true)

          echo "Non-trivial changed files:"
          echo "${CODE_FILES:-<none>}"

          # ---- source-touching detection ------------------------------------
          # Matches: src/** scripts/** lib/** libs/** bin/** cmd/** pkg/**
          #          *.py *.ts *.tsx *.js *.rs *.go *.sh
          SOURCE_PATTERN='(^(src|scripts|lib|libs|bin|cmd|pkg)/)|(\.py|\.ts|\.tsx|\.js|\.rs|\.go|\.sh)$'
          SOURCE_FILES=$(echo "$CODE_FILES" | grep -E "$SOURCE_PATTERN" || true)

          echo "Source files touched:"
          echo "${SOURCE_FILES:-<none>}"

          # ---- README detection --------------------------------------------
          # Accept README.md at repo root OR in any directory that was changed.
          README_CHANGED=$(echo "$FILES" | grep -iE '(^|/)README\.md$' || true)

          echo "README files changed:"
          echo "${README_CHANGED:-<none>}"

          # ---- label check -------------------------------------------------
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          SKIP_LABEL=$(echo "$LABELS" | python3 -c \
            "import sys,json; labels=json.load(sys.stdin); print('true' if 'skip-readme-check' in labels else 'false')")

          echo "skip-readme-check label present: $SKIP_LABEL"

          # ---- export outputs ----------------------------------------------
          IS_CODE_TOUCHING="false"
          [ -n "$SOURCE_FILES" ] && IS_CODE_TOUCHING="true"

          IS_README_CHANGED="false"
          [ -n "$README_CHANGED" ] && IS_README_CHANGED="true"

          echo "is_code_touching=${IS_CODE_TOUCHING}"   >> "$GITHUB_OUTPUT"
          echo "is_readme_changed=${IS_README_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "skip_label=${SKIP_LABEL}"               >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Path: skip-readme-check label applied
      # -----------------------------------------------------------------------
      - name: Post skip warning comment
        if: |
          steps.changed.outputs.is_code_touching == 'true' &&
          steps.changed.outputs.is_readme_changed == 'false' &&
          steps.changed.outputs.skip_label == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY="### README Staleness Check — Skipped ⚠️

          The **\`skip-readme-check\`** label is applied to this PR.

          This PR touches source files but does **not** update \`README.md\`.
          The check has been **bypassed by label** — please ensure documentation
          is updated before or shortly after merge.

          _Automated check by \`.github/workflows/readme-staleness.yml\`_"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$BODY" 2>/dev/null || true

          echo "RESULT: skip-readme-check label present — passing with warning."

      # -----------------------------------------------------------------------
      # Path: code-touching but no README, no skip label → FAIL
      # -----------------------------------------------------------------------
      - name: Post failure comment
        if: |
          steps.changed.outputs.is_code_touching == 'true' &&
          steps.changed.outputs.is_readme_changed == 'false' &&
          steps.changed.outputs.skip_label == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY="### README Staleness Check — Failed ❌

          This PR modifies source code but does **not** update \`README.md\`.

          **What to do:**
          - Update \`README.md\` (repo root or relevant subdirectory) to reflect
            your changes, then push again.
          - OR apply the \`skip-readme-check\` label if documentation is not
            required for this change (e.g. internal refactor, hotfix) — a warning
            comment will be left instead.

          **Ignored paths** (do not trigger this check):
          \`*.md\`, \`.github/**\`, \`*.txt\`, \`LICENSE*\`, \`.gitignore\`, \`tests/**\`, \`test/**\`, \`**/__tests__/**\`

          _Automated check by \`.github/workflows/readme-staleness.yml\`_"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$BODY" 2>/dev/null || true

      - name: Fail the check
        if: |
          steps.changed.outputs.is_code_touching == 'true' &&
          steps.changed.outputs.is_readme_changed == 'false' &&
          steps.changed.outputs.skip_label == 'false'
        run: |
          echo "::error ::README not updated — this PR touches source files but README.md was not modified. Update README.md or apply the 'skip-readme-check' label."
          exit 1

      # -----------------------------------------------------------------------
      # Path: pass
      # -----------------------------------------------------------------------
      - name: Pass
        if: |
          steps.changed.outputs.is_code_touching == 'false' ||
          steps.changed.outputs.is_readme_changed == 'true'
        run: |
          if [ "${{ steps.changed.outputs.is_code_touching }}" = "false" ]; then
            echo "RESULT: No source files changed — README check not applicable. ✅"
          else
            echo "RESULT: Source files changed AND README.md updated. ✅"
          fi
