name: Routing Protocol v1 Conformance Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/conformance/**'
      - '.github/workflows/routing-conformance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/conformance/**'
      - '.github/workflows/routing-conformance.yml'

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install claude-swarm dependencies if needed
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run routing conformance tests
        run: |
          pytest tests/conformance/ -v --tb=short --color=yes

      - name: Generate coverage report
        run: |
          pytest tests/conformance/ --cov=tests.conformance --cov-report=term-missing --cov-report=xml

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: conformance-test-results
          path: |
            .coverage
            coverage.xml
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## Routing Conformance Tests\n\n✅ All tests passed!\n\n';
            if (fs.existsSync('coverage.xml')) {
              comment += '📊 Coverage report available in artifacts.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
