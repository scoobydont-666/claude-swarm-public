name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pyyaml typer rich fastapi httpx uvicorn requests prometheus_client

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_alert_rules.py --ignore=tests/test_backpressure.py -k "not test_cycle_processes_all_rules and not test_update_status_nfs_fallback"
