# Model-size routing configuration — NAI Swarm backport
# Maps model sizes to GPU requirements for intelligent dispatch routing.
#
# Used by hydra_dispatch.py to determine GPU count and host requirements
# when dispatching inference workloads.

# Model registry: model name/pattern → resource requirements
models:
  # Small models (1 GPU, any node)
  "7b":
    gpu_count: 1
    min_vram_gb: 8
    hosts: [node_gpu, node_reserve2, node_reserve1, node_mongo, node_primary]
    examples: [qwen2.5-coder-7b, llama3.1-8b, mistral-7b, glm-4.9b]

  "13b":
    gpu_count: 1
    min_vram_gb: 12
    hosts: [node_gpu, node_reserve2, node_reserve1, node_mongo, node_primary]
    examples: [codellama-13b, llama2-13b]

  "14b":
    gpu_count: 1
    min_vram_gb: 12
    hosts: [node_gpu, node_reserve1, node_mongo, node_primary]
    examples: [qwen2.5-14b, deepseek-coder-v2-16b]

  # Medium models (1 GPU, needs 32GB+ VRAM)
  "32b":
    gpu_count: 1
    min_vram_gb: 24
    hosts: [node_gpu, node_reserve1]
    examples: [qwen3-32b, deepseek-r1-32b, codestral-22b]

  # Large models (1 GPU on node_gpu 96GB, or 2 GPUs on node_reserve1)
  "70b":
    gpu_count: 1
    min_vram_gb: 48
    hosts: [node_gpu]
    examples: [llama3.3-70b, qwen2.5-72b, deepseek-r1-70b]

  # Very large models (need tensor parallelism)
  "405b":
    gpu_count: 4
    min_vram_gb: 96
    tensor_parallel: true
    hosts: []  # No single node can run this yet
    examples: [llama3.1-405b]

# Fleet GPU inventory (for routing decisions)
fleet_gpus:
  node_gpu:
    count: 1
    model: RTX PRO 6000 Blackwell
    vram_gb: 96
  node_reserve2:
    count: 1
    model: RTX 5060 Ti
    vram_gb: 16
  node_reserve1:
    count: 2
    model: RTX 5080
    vram_gb: 16  # per GPU
  node_mongo:
    count: 1
    model: RTX 5080
    vram_gb: 16
  node_primary:
    count: 1
    model: RTX 4080 Laptop (AD104M, Ada Lovelace, 58 SMs)
    vram_gb: 12
    compute_cap: "8.9"
    peak_mem_bw_gbps: 432
    measured_d2d_gbps: 182
    pcie_note: "Root port Gen4 x4, negotiated Gen2 x2 — BIOS update needed (AMI v1.00 2026-01-15)"
    pcie_h2d_gbps: 2.9
    pcie_d2h_gbps: 3.0

# Routing rules: pattern-based model classification
rules:
  - name: code-analysis
    pattern: "^(fix|refactor|debug|security|performance)"
    default_model: sonnet
    gpu_required: false

  - name: inference-small
    pattern: "(7b|8b|mistral|phi)"
    default_model: null  # local model
    gpu_required: true
    model_size: "7b"

  - name: inference-medium
    pattern: "(13b|14b|16b|qwen.*14)"
    default_model: null
    gpu_required: true
    model_size: "13b"

  - name: inference-large
    pattern: "(32b|33b|deepseek.*32|qwen.*32)"
    default_model: null
    gpu_required: true
    model_size: "32b"

  - name: inference-xlarge
    pattern: "(70b|72b|llama.*70|qwen.*72)"
    default_model: null
    gpu_required: true
    model_size: "70b"

# Default: if no rule matches, use standard dispatch
default:
  gpu_required: false
  model_size: null


# ═══════════════════════════════════════════════════════════════════════════
# ROUTING PROTOCOL v1 — 2026-04-18
# See <hydra-project-path>/docs/routing-protocol-v1.md for full spec.
# ═══════════════════════════════════════════════════════════════════════════

# Provider ladder (v1 = Anthropic only; Cursor slot reserved for v2)
providers:
  default: anthropic
  supported: [anthropic]
  planned: [cursor]

# Tier ladder — local LLM first, fail-up to cloud
tier_ladder:
  - tier: "1a"
    label: "local-3b"
    models: [hydracoder:3bv1]
    slot_size: "3b"
    min_vram_gb: 4
    hosts: [node_primary, node_reserve2, node_mongo, node_gpu, node_reserve1]
  - tier: "1b"
    label: "local-7b"
    models: [hydracoder:7bv4, hydra-coder:v3]
    slot_size: "7b"
    min_vram_gb: 8
    hosts: [node_primary, node_reserve2, node_mongo, node_gpu, node_reserve1]
  - tier: "2"
    label: "local-14b"
    models: [phi4:14b, hydracoder:v5, hydra-coder-14b]
    slot_size: "14b"
    min_vram_gb: 12
    hosts: [node_primary, node_gpu, node_reserve1, node_reserve2, node_mongo]
    default_for: [codegen_lane_1]  # phi4:14b on node_primary, keep_alive=-1
  - tier: "3"
    label: "local-32b"
    models: [hydracoder:32bv2, qwen2.5-coder:32b]
    slot_size: "32b"
    min_vram_gb: 24
    hosts: [node_gpu]
  - tier: "4"
    label: "cloud-haiku"
    models: [claude-haiku-4-5-20251001]
    provider: anthropic
    slot_type: cloud_worker
  - tier: "5"
    label: "cloud-sonnet"
    models: [claude-sonnet-4-6]
    provider: anthropic
    slot_type: cloud_worker
  - tier: "6"
    label: "cloud-opus"
    models: [claude-opus-4-7]
    provider: anthropic
    slot_type: coordinator_self  # coordinator executes inline

# Dispatch class table — maps task types to worker kind
dispatch_class:
  inline:        # coordinator executes directly, no dispatch
    - single_file_edit_under_30_loc
    - grep_single_pattern
    - read_single_file
    - bash_under_2s
  local_llm:     # Tier 1-3 with CB-augmented context
    - new_function_or_class
    - multi_file_refactor
    - unit_test_generation
    - config_file_generation
    - rag_assisted_codegen
  bg_subagent:   # Claude Agent subagents (cap 3 concurrent)
    - cross_repo_research
    - multi_step_investigation
    - long_running_analysis
  fleet_dispatch:  # SSH / ansible to other hosts
    - cpu_parallel_batch
    - gpu_bound_training
    - large_model_inference

# Override rule: force dispatch even if class=inline when output is large
dispatch_override:
  min_expected_tokens: 500   # ≥500 tokens → dispatch
  min_files_touched: 2       # >2 files → dispatch

# Host preference — where to send heavy work by default
host_preference:
  coordinator_latency_local: node_primary   # inline + small dispatches
  primary_heavy: node_gpu                    # bulk dispatch target (62 CPU + 8 GPU slots)
  overflow: [node_reserve1, node_reserve2, node_mongo]

# Slot accounting — coarse-grain, keyed by model name → size
slot_accounting:
  grain: coarse
  mega_pool_policy: single   # one 32GB pool; falls back to per-card on hard fail
  cloud_worker_cap: 3        # max concurrent bg Claude subagents per session

# Per-host slot capacity (physical audit 2026-04-18)
host_slots:
  node_primary:
    cpu_slots: 10            # 12 cores - 2 reserve
    gpu_slots: { "7b": 1 }   # phi4:14b quantized is tight but fits
    vram_gb: 12
  node_gpu:
    cpu_slots: 62            # 64 cores - 2 reserve (128 threads available)
    gpu_slots: { "3b": 8, "7b": 4, "14b": 2, "32b": 1 }
    vram_gb: 96
  node_reserve1:
    cpu_slots: 62
    gpu_slots: { "7b": 4, "14b": 2 }   # 2× RTX 5080, single-pool default
    vram_gb: 32              # 2× 16GB pooled
  node_reserve2:
    cpu_slots: 22            # 24 cores - 2
    gpu_slots: { "7b": 2, "14b": 1 }
    vram_gb: 16
  node_mongo:
    cpu_slots: 10
    gpu_slots: { "7b": 2, "14b": 1 }
    vram_gb: 16

# Back-pressure + rate limits
back_pressure:
  queue_depth_multiplier: 2  # queue = 2× slot count per pool
  on_full: escalate_next_tier
  coordinator_dispatches_per_minute: 10

# Retry / escalation policy
retry_policy:
  max_retries_per_tier: 1    # 1 retry before escalating
  max_escalations_per_task: 3
  on_exhausted: dlq          # "dlq" | "fail_plan"
  dlq_blocks_plan_completion: true
  stuck_worker_kill_minutes: 5

# Heartbeat cadence
heartbeat:
  interval_s: 30
  timeout_s: 90

# State store cascade (Q5 resolution)
state_store_cascade:
  - redis                    # hot, primary
  - context_bridge           # fact-assert fallback
  - sqlite                   # durable fallback
  - fail_closed              # degraded final state
redis_retry_window_s: 5

# Context budget per tier (Q9 resolution)
context_budget:
  "1-3b":  { ctx_window: 8000,   cb_exemplars: 2000,  task_prompt: 1000, repo_files: 3000 }
  "1-7b":  { ctx_window: 32000,  cb_exemplars: 8000,  task_prompt: 2000, repo_files: 16000 }
  "2-14b": { ctx_window: 32000,  cb_exemplars: 16000, task_prompt: 2000, repo_files: 32000 }
  "3-32b": { ctx_window: 128000, cb_exemplars: 32000, task_prompt: 4000, repo_files: 64000 }
  "4+":    { ctx_window: 200000, cb_exemplars: 0,     task_prompt: 0,    repo_files: 0 }

# Output validation gates per dispatch
validation_gates:
  python: [ruff_check, mypy, pytest_collect]
  rust: [cargo_check]
  go: [go_vet, go_build]
  bash: [shellcheck]
  yaml: [yamllint]

# High-stakes tasks requiring coordinator spot-read
review_coordinator:
  - multi_file_refactor
  - security_adjacent_code
  - infrastructure_as_code

# ═══════════════════════════════════════════════════════════════════════════
# FLEET GPU LOADOUT — locked 2026-04-26, provisioned 2026-04-27
# Source of truth: ~/.claude/projects/-opt-hydra-project/memory/project_fleet_gpu_loadout_2026_04_26.md
# Per-task-class routing for build-quality dogfood. Supersedes hydracoder:*
# entries in tier_ladder above where applicable.
# ═══════════════════════════════════════════════════════════════════════════

fleet_gpu_loadout:
  node_gpu:
    gpu: "RTX PRO 6000 Blackwell 96GB"
    models:
      primary: "qwen3.6:27b"            # code-gen primary
      review: "hydra-coder-32b-grok:v1" # code-review
      planning: "llama3.3:70b"          # architecture
  node_reserve1:
    gpu: "2x RTX 5080 32GB total"
    models:
      gpu0: "qwen2.5-coder:14b"  # code overflow, Q4 KV @ 32K
      gpu1: "devstral:latest"    # function-calling specialist (won bakeoff)
  node_mongo:
    gpu: "RTX 5080 16GB"
    models:
      reasoning: "phi-4:14b"     # RAG synthesis, deep reasoning
  node_reserve2:
    gpu: "RTX 5060 Ti 16GB"
    models:
      lint: "qwen2.5-coder:7b"   # structured extraction
      fallback: "phi4:14b"
  node_primary:
    gpu: "RTX 4080 Laptop 12GB"
    dedicated: "hydra-neuronet"
    model: "qwen3:14b-hnn"       # Q4 KV @ 32K, locked for HNN

task_class_routing:
  code_generation: { primary: [node_gpu, "qwen3.6:27b"], fallback: [node_reserve1, "qwen2.5-coder:14b"] }
  code_review:     { primary: [node_gpu, "hydra-coder-32b-grok:v1"], deep: [node_mongo, "phi-4:14b"] }
  architecture:    { primary: [node_gpu, "llama3.3:70b"], cloud_fallback: "claude-sonnet-4-6" }
  function_calling:{ primary: [node_reserve1, "devstral:latest"] }
  lint_extract:    { primary: [node_reserve2, "qwen2.5-coder:7b"], fallback: [node_reserve2, "phi4:14b"] }
  rag_synthesis:   { primary: [node_mongo, "phi-4:14b"], hnn: [node_primary, "qwen3:14b-hnn"] }
  hard_reasoning:  { cloud_only: "claude-opus-4-7" }
