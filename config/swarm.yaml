# Rendered by ansible role: claude_swarm_config
# Source: <hydra-project-path>/ansible/roles/claude_swarm_config/templates/swarm.yaml.j2
# DO NOT edit this file directly — re-run the role instead.

swarm:
  name: hydra-swarm
  version: 1
nodes:
  node_primary:
    ip: <orchestration-node-ip>
    role: replica
    cpu: AMD Ryzen AI 9 HX 470 (12c/24t, 5.3GHz boost)
    ram: 48GB DDR5
    gpu: NVIDIA GeForce RTX 4080 Laptop (12GB VRAM)
    os: Ubuntu 24.04.4 LTS
    capabilities:
    - docker
    - tailscale
    - cpu
    - gpu
    - ollama
    projects:
    - monero-farm
    - hydra-project
    - examforge
  node_gpu:
    ip: <primary-node-ip>
    role: primary
    capabilities:
    - docker
    - gpu
    - ollama
    - tailscale
    - cpu
    projects:
    - ai-project
    - audit-sentinel
    - project-a-project
    - claude-code-costguard
    - comfyforge
    - documint
    - examforge
    - hashrate-hedger
    - hydra-forge
    - hydra-media
    - hydra-project
    - hydra-pulse
    - monero-farm
    - nutantforge
    - prompt-forge
    - solar-sentinel
    - str-project
    - taxprep-project
  node_reserve1:
    ip: <gpu-node-ip>
    role: worker
    capabilities:
    - cpu
    - cpu_heavy
    - gpu
    - ollama
    - mining
    - docker
    projects:
    - ai-project
    - project-a-project
    - examforge
    - hydra-forge
    - hydra-media
    - hydra-project
    - monero-farm
    - nutantforge
    - prompt-forge
    - taxprep-project
  node_mongo:
    ip: <node-mongo-ip>
    role: worker
    capabilities:
    - gpu
    - ollama
    - cpu
    - docker
    projects:
    - hydra-project
    - ai-project
    - claude-swarm
    - examforge
    - nutantforge
  node_reserve2:
    ip: <gpu-worker-ip>
    role: worker
    capabilities:
    - gpu
    - ollama
    - comfyui
    - docker
    - cpu
    - tailscale
    projects:
    - ai-project
    - project-a-project
    - comfyforge
    - examforge
    - hydra-forge
    - hydra-media
    - hydra-project
    - nutantforge
    - prompt-forge
    - solar-sentinel
    - taxprep-project

nfs:
  primary: <primary-node-ip>:/opt/swarm
  replica: <orchestration-node-ip>:/opt/swarm-replica
  mount_point: /opt/swarm
  sync_interval_seconds: 30

git:
  repo: your-github-user/claude-config
  branch: main
  sync_interval_seconds: 60
  sync_on_task_complete: true

heartbeat:
  interval_seconds: 60
  stale_threshold_seconds: 300

tasks:
  auto_claim: false
  notify_on_new: true

decomposition:
  enabled: true
  auto_suggest: true
  capability_routing:
    ollama: [node_gpu, node_reserve2, node_reserve1, node_mongo, node_primary]
    gpu:    [node_gpu, node_reserve2, node_reserve1, node_mongo, node_primary]
    mining: [node_primary, node_reserve1]
    cpu:    [node_reserve1, node_gpu, node_reserve2, node_mongo, node_primary]
    cpu_heavy: [node_reserve1, node_gpu]
    docker: [node_gpu, node_reserve2, node_reserve1, node_mongo, node_primary]
    docker_swarm: [node_gpu]

worktrees:
  enabled: true
  base_path: /tmp/swarm-worktrees
  auto_cleanup_hours: 24
  branch_prefix: swarm

summaries:
  enabled: true
  auto_generate: true
  max_decisions: 10
  max_files: 20
  retention_days: 30

work_generator:
  enabled: true
  scan_interval_minutes: 30
  prometheus_url: http://127.0.0.1:9090
  max_pending_tasks: 10
  projects:
    examforge:        {path: /opt/examforge,        host: node_primary}
    audit-sentinel:   {path: /opt/audit-sentinel,   host: node_primary}
    clausehound:      {path: /opt/clausehound,      host: node_primary}
    prompt-forge:     {path: /opt/prompt-forge,     host: node_primary}
    hashrate-hedger:  {path: /opt/hashrate-hedger,  host: node_primary}
    documint:         {path: /opt/documint,         host: node_primary}
    project-a-project:  {path: <project-a-path>,  host: node_gpu}
    solar-sentinel:   {path: /opt/solar-sentinel,   host: node_primary}
    comfyforge:       {path: /opt/comfyforge,       host: node_reserve2}
    hydra-forge:      {path: /opt/hydra-forge,      host: node_gpu}
    hydra-media:      {path: /opt/hydra-media,      host: node_primary}
    hydra-pulse:      {path: /opt/hydra-pulse,      host: node_primary}
    claude-code-costguard: {path: /opt/claude-code-costguard, host: node_primary}

auto_dispatch:
  enabled: true
  mode: full
  max_concurrent_dispatches: 3

scheduled_maintenance:
  daily_hour: 6
  weekly_day: 0

health_monitor:
  enabled: true
  check_interval_seconds: 60
  prometheus_url: http://127.0.0.1:9090
  email_alerts: admin@example.com
  hosts:
    node_primary:
      ip: <orchestration-node-ip>
      services: [monerod, p2pool-main, p2pool-mini, p2pool-nano, prometheus, grafana-server, crowdsec]
    node_gpu:
      ip: <primary-node-ip>
      services: [docker, fail2ban, crowdsec]
    node_reserve1:
      ip: <gpu-node-ip>
      services: [fail2ban, crowdsec, prometheus-node-exporter]
    node_mongo:
      ip: <node-mongo-ip>
      services: [ollama, prometheus-node-exporter]
    node_reserve2:
      ip: <gpu-worker-ip>
      services: [docker]
  cooldowns:
    restart_service: 600
    force_sync_replica: 300
    alert_email: 3600
  thresholds:
    disk_usage_percent: 85
    stale_node_seconds: 600
    dirty_repo_minutes: 480
    gpu_vram_percent: 95

# Opus 4.7 task_budget — advisory token budget the model sees and self-regulates
# against for long-horizon agent runs. Min 20_000 per Anthropic spec.
routing:
  task_budget_total: 128000
