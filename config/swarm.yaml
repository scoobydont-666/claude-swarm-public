swarm:
  name: hydra-swarm
  version: 1
nodes:
  orchestration-node:
    ip: 192.168.200.170
    role: replica
    cpu: AMD Ryzen AI 9 HX 470 (12c/24t, 5.3GHz boost)
    ram: 48GB DDR5 (46Gi usable)
    igpu: AMD Radeon 890M (Strix Point)
    gpu: NVIDIA GeForce RTX 4080 Laptop (12GB VRAM, AD104M, Ada Lovelace, 58 SMs)
    gpu_driver: "590.48.01"
    cuda: "13.1"
    gpu_vbios: "95.04.1F.00.14"
    gpu_pcie: "Gen4 x4 root port, negotiated Gen2 x2 (DEGRADED — BIOS v1.00 2026-01-15, update needed)"
    gpu_pcie_bandwidth: "~3 GB/s measured (should be ~8 GB/s at Gen4 x4)"
    gpu_max_clocks: "3105 MHz graphics, 9001 MHz memory"
    gpu_peak_mem_bw: "432 GB/s theoretical, 182 GB/s measured D2D"
    gpu_power_limit: "150W"
    gpu_compute_cap: "8.9"
    usb4:
      controllers: 2
      generation: 4
      max_bandwidth: "80 Gbps (10 GB/s)"
    bios:
      vendor: "American Megatrends International"
      version: "1.00"
      date: "2026-01-15"
      note: "Initial release — check MinisForum for PCIe link training fix"
    storage:
      root: Samsung 990 EVO Plus 2TB NVMe (Gen4 x4, 3954/4876 MB/s seq r/w, 958K rand4k IOPS)
      data: Viper VP4300L 1TB NVMe (4395/4741 MB/s seq r/w, mounted /data)
    network: Realtek RTL8125 2.5GbE (full duplex, r8169 driver)
    os: Ubuntu 24.04.4 LTS (kernel 6.17.0-20-generic)
    benchmarks:
      cpu_single_thread: "2449 events/sec (sysbench prime 20K)"
      cpu_multi_thread: "23001 events/sec (24 threads, sysbench prime 20K)"
      mem_bandwidth: "35.2 GB/s (24-thread, 1M blocks)"
      root_nvme_seq_read: "3954 MB/s"
      root_nvme_seq_write: "4876 MB/s"
      root_nvme_rand4k_iops: 957831
      data_nvme_seq_read: "4395 MB/s"
      data_nvme_seq_write: "4741 MB/s"
      gpu_pcie_h2d: "2.9 GB/s"
      gpu_pcie_d2h: "3.0 GB/s"
      gpu_d2d_bandwidth: "181.8 GB/s"
      gpu_compute_stress: "2094 kernels/30s, 0 errors"
      gpu_vram_fill: "10198 MiB filled, 0 bad bytes"
      benchmark_date: "2026-04-12"
    capabilities:
    - docker
    - tailscale
    - cpu
    - gpu
    - ollama
    - usb4
    projects:
    - monero-farm
    - hydra-project
    - examforge
  gpu-server-1:
    ip: 10.0.0.1
    role: primary
    capabilities:
    - docker
    - gpu
    - ollama
    - tailscale
    - cpu
    projects:
    - ai-project
    - audit-sentinel
    - cco
    - christi-project
    - claude-code-costguard
    - clausehound
    - comfyforge
    - documint
    - examforge
    - hashrate-hedger
    - hydra-forge
    - hydra-media
    - hydra-project
    - hydra-pulse
    - monero-farm
    - nutantforge
    - prompt-forge
    - solar-sentinel
    - str-project
    - taxprep-project
  gpu-server-3:
    ip: 10.0.0.3
    role: worker
    capabilities:
    - cpu
    - cpu_heavy
    - gpu
    - ollama
    - mining
    - docker
    projects:
    - ai-project
    - audit-sentinel
    - cco
    - christi-project
    - claude-code-costguard
    - clausehound
    - comfyforge
    - documint
    - examforge
    - hashrate-hedger
    - hydra-forge
    - hydra-media
    - hydra-project
    - hydra-pulse
    - monero-farm
    - nutantforge
    - prompt-forge
    - solar-sentinel
    - str-project
    - taxprep-project
  gpu-server-4:
    ip: 10.0.0.4
    role: worker
    capabilities:
    - gpu
    - ollama
    - cpu
    - docker
    projects:
    - hydra-project
    - ai-project
    - claude-swarm
    - examforge
    - nutantforge
  gpu-server-2:
    ip: 10.0.0.2
    role: worker
    capabilities:
    - gpu
    - ollama
    - comfyui
    - docker
    - cpu
    - tailscale
    projects:
    - ai-project
    - audit-sentinel
    - cco
    - christi-project
    - claude-code-costguard
    - clausehound
    - comfyforge
    - documint
    - examforge
    - hashrate-hedger
    - hydra-forge
    - hydra-media
    - hydra-project
    - hydra-pulse
    - monero-farm
    - nutantforge
    - prompt-forge
    - solar-sentinel
    - str-project
    - taxprep-project
nfs:
  primary: 10.0.0.1:/var/lib/swarm
  replica: 192.168.200.170:/var/lib/swarm-replica
  mount_point: /var/lib/swarm
  sync_interval_seconds: 30
git:
  repo: your-github-user/claude-config
  branch: main
  sync_interval_seconds: 60
  sync_on_task_complete: true
heartbeat:
  interval_seconds: 60
  stale_threshold_seconds: 300
tasks:
  auto_claim: false
  notify_on_new: true
decomposition:
  enabled: true
  auto_suggest: true
  capability_routing:
    ollama:
    - gpu-server-1
    - gpu-server-2
    - gpu-server-3
    - gpu-server-4
    - orchestration-node
    gpu:
    - gpu-server-1
    - gpu-server-2
    - gpu-server-3
    - gpu-server-4
    - orchestration-node
    mining:
    - orchestration-node
    - gpu-server-3
    cpu:
    - gpu-server-3
    - gpu-server-1
    - gpu-server-2
    - gpu-server-4
    - orchestration-node
    cpu_heavy:
    - gpu-server-3
    - gpu-server-1
    docker:
    - gpu-server-1
    - gpu-server-2
    - gpu-server-3
    - gpu-server-4
    - orchestration-node
    docker_swarm:
    - gpu-server-1
worktrees:
  enabled: true
  base_path: /tmp/swarm-worktrees
  auto_cleanup_hours: 24
  branch_prefix: swarm
summaries:
  enabled: true
  auto_generate: true
  max_decisions: 10
  max_files: 20
  retention_days: 30
work_generator:
  enabled: true
  scan_interval_minutes: 30
  prometheus_url: http://127.0.0.1:9090
  max_pending_tasks: 10
  projects:
    examforge:
      path: /opt/examforge
      host: orchestration-node
    audit-sentinel:
      path: /opt/audit-sentinel
      host: orchestration-node
    clausehound:
      path: /opt/clausehound
      host: orchestration-node
    prompt-forge:
      path: /opt/prompt-forge
      host: orchestration-node
    hashrate-hedger:
      path: /opt/hashrate-hedger
      host: orchestration-node
    documint:
      path: /opt/documint
      host: orchestration-node
    christi-project:
      path: /opt/christi-project
      host: gpu-server-1
    solar-sentinel:
      path: /opt/solar-sentinel
      host: orchestration-node
    comfyforge:
      path: /opt/comfyforge
      host: gpu-server-2
    hydra-forge:
      path: /opt/hydra-forge
      host: gpu-server-1
    hydra-media:
      path: /opt/hydra-media
      host: orchestration-node
    hydra-pulse:
      path: /var/lib/hydra-pulse
      host: orchestration-node
    claude-code-costguard:
      path: /opt/claude-code-costguard
      host: orchestration-node
auto_dispatch:
  enabled: true
  mode: full
  max_concurrent_dispatches: 3
scheduled_maintenance:
  daily_hour: 6
  weekly_day: 0
health_monitor:
  enabled: true
  check_interval_seconds: 60
  prometheus_url: http://127.0.0.1:9090
  email_alerts: admin@example.com
  hosts:
    orchestration-node:
      ip: 192.168.200.170
      services:
      - monerod
      - p2pool-main
      - p2pool-mini
      - p2pool-nano
      - prometheus
      - grafana-server
      - crowdsec
    gpu-server-1:
      ip: 10.0.0.1
      services:
      - docker
      - fail2ban
      - crowdsec
    gpu-server-3:
      ip: 10.0.0.3
      services:
      - fail2ban
      - crowdsec
      - prometheus-node-exporter
    gpu-server-4:
      ip: 10.0.0.4
      services:
      - ollama
      - prometheus-node-exporter
    gpu-server-2:
      ip: 10.0.0.2
      services:
      - docker
  cooldowns:
    restart_service: 600
    force_sync_replica: 300
    alert_email: 3600
  thresholds:
    disk_usage_percent: 85
    stale_node_seconds: 600
    dirty_repo_minutes: 480
    gpu_vram_percent: 95
