# Public repo gitleaks policy — minimal allowlist
# Internal hostnames are NOT permitted in public output; sanitizer handles those.
# This allowlist is reserved for generic IP patterns only.
[allowlist]
regexes = [
  # Private RFC1918 IPs in example configs only (generic, not tied to our infra)
  "10\\.0\\.0\\.(10|20|30|99|100|50)",
]
