apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-swarm
  namespace: ai-cluster
  labels:
    app: claude-swarm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claude-swarm
  template:
    metadata:
      labels:
        app: claude-swarm
    spec:
      containers:
        - name: claude-swarm
          image: claude-swarm:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: claude-swarm
  namespace: ai-cluster
spec:
  type: ClusterIP
  selector:
    app: claude-swarm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
