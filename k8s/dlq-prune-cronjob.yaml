---
# S3-11 DLQ prune CronJob
# Runs every 6 hours to trim DLQ entries older than 72h.
# XADD already caps at _DLQ_MAXLEN=5000, so this is primarily dashboard hygiene
# — keeps the Grafana "DLQ depth by kind" panels meaningful for triage.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-swarm-dlq-prune
  namespace: ai-cluster
  labels:
    app.kubernetes.io/name: claude-swarm
    app.kubernetes.io/component: maintenance
spec:
  schedule: "17 */6 * * *"       # every 6 hours at :17 (stagger off the top-of-hour rush)
  concurrencyPolicy: Forbid       # two concurrent prunes would race on XTRIM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: claude-swarm
            app.kubernetes.io/component: maintenance
        spec:
          restartPolicy: OnFailure
          containers:
            - name: prune
              image: IMAGE_PLACEHOLDER   # overlay with the same image as Deployment at deploy time
              imagePullPolicy: IfNotPresent
              command:
                - python3
                - /app/scripts/dlq_prune.py
                - --hours
                - "72"
              envFrom:
                - configMapRef:
                    name: claude-swarm-config
                - secretRef:
                    name: claude-swarm-secrets
                    optional: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
